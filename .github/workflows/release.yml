name: Release

# Builds installer artifacts for the desktop app and attaches them to a GitHub
# Release. Triggered by pushing a version tag (`v0.2.0`); `workflow_dispatch`
# lets a run be kicked off by hand (e.g. to rebuild artifacts for an existing
# tag) without pushing a new one.
#
# Bump `crates-tauri/tt-app/tauri.conf.json`'s `version` (and, for parity,
# `crates-tauri/tt-app/Cargo.toml`'s `[package].version`, which is what the
# running app reports via `package_info().version` for the update-check
# banner — see `crates-tauri/tt-app/src/update.rs`) before tagging; this
# workflow does not bump it for you.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build artifacts for"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Pinned ghostty commit tt-vt builds against (see the GHOSTTY_COMMIT
  # constant in libghostty-vt-sys's build.rs) — kept in sync with ci.yml.
  GHOSTTY_COMMIT: fdbf9ff3a31d7531b691cb49c98fc465a1a503a0

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # .deb + .AppImage. rpm bundling needs extra host tooling this
          # runner doesn't have, so it's left out rather than made flaky.
          - platform: ubuntu-latest
            name: linux
            args: "--bundles deb,appimage"
          # Apple Silicon only — Intel Macs are not a supported target.
          - platform: macos-latest
            name: macos-arm
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Provision pinned Rust toolchain
        # See the matching step/comment in ci.yml: strip any toolchain other
        # than the rust-toolchain.toml pin so Swatinem/rust-cache's key stays
        # deterministic across runs and platforms.
        run: |
          rustup toolchain install
          active=$(rustup show active-toolchain | awk '{print $1}')
          for tc in $(rustup toolchain list | awk '{print $1}'); do
            [ "$tc" = "$active" ] || rustup toolchain uninstall "$tc"
          done

      - name: Add macOS Rust target
        if: startsWith(matrix.platform, 'macos')
        run: rustup target add aarch64-apple-darwin

      # Xcode 26.4's SDK changed how arm64e-macos is represented in .tbd stub
      # files, which zig 0.15.x's linker can't match against aarch64-macos
      # targets — it fails to link zig's own build-runner tool against
      # libSystem with dozens of "undefined symbol" errors (ziglang/zig#31658
      # on Codeberg; fixed upstream by zig PR #31673, not yet in a 0.15.x
      # release). Best-effort: pin to the newest older Xcode still on the
      # runner image. If none is found this is a no-op and the build will
      # fail with the same linker errors — check whether a newer zig 0.15.x
      # patch has the fix before reaching for this again.
      - name: Work around zig/Xcode 26.4 linker bug (ziglang/zig#31658)
        if: startsWith(matrix.platform, 'macos')
        run: |
          for dir in $(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -rV); do
            version=$(basename "$dir" .app | sed 's/Xcode_//')
            if [ "$(printf '%s\n26.4\n' "$version" | sort -V | head -1)" != "26.4" ]; then
              sudo xcode-select -s "$dir/Contents/Developer"
              echo "Selected $dir for zig build (avoiding the 26.4 SDK bug)"
              xcodebuild -version
              exit 0
            fi
          done
          echo "::warning::No pre-26.4 Xcode found on this runner; zig build may hit ziglang/zig#31658"

      # Tauri v2 Linux prerequisites (see tauri.app/start/prerequisites) — same
      # package set as the rust-app job in ci.yml. Same apt-cache approach too
      # (see the comment on that step in ci.yml for why plain actions/cache
      # over a third-party apt-caching action).
      - name: Cache apt packages
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-tauri-deps-${{ runner.os }}

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      # tt-vt (a dependency of tt-app) shells out to `zig build` against a
      # ghostty source checkout — same provisioning as ci.yml's rust-vt/rust-app
      # jobs, needed on every platform in this matrix.
      - name: Provision Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache ghostty source
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: ghostty-src
          key: ghostty-src-${{ runner.os }}-${{ env.GHOSTTY_COMMIT }}

      - name: Clone ghostty source
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none --no-checkout \
            https://github.com/ghostty-org/ghostty.git ghostty-src
          git -C ghostty-src checkout "$GHOSTTY_COMMIT"

      - uses: Swatinem/rust-cache@v2
        with:
          # The cache-key charset disallows commas, so this uses matrix.name
          # rather than matrix.args (which contains "deb,appimage").
          key: release-${{ matrix.name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
        with:
          # tauri.conf.json lives with the Tauri crate, not at repo root (this
          # is a Yaak-style monorepo — see CLAUDE.md). tauri-action has no
          # config-path input; it shells out to the same `tauri` CLI the root
          # `npm run build` uses, which auto-discovers tauri.conf.json by
          # scanning the Cargo workspace members (verified: the local
          # `npm run run` / `npm run build` scripts already rely on this from
          # repo root with no explicit path).
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Towles Tool ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          # Draft so a release is reviewed (notes, artifact sanity) before it
          # goes live to `releases/latest` — the endpoint the app's update
          # check polls (crates/tt-update).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
