name: CI

on:
  push:
    branches: [main]
    paths-ignore: &non-rust-paths
      - "apps/client/**"
      - "e2e/**"
      - "docs/**"
      - "scripts/**"
      - "**/*.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
      - ".github/workflows/release.yml"
  pull_request:
    paths-ignore: *non-rust-paths

# Cancel superseded runs on the same ref to keep CI fast.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # rust-vt and rust-app provision zig + a ghostty checkout on top of the
  # base toolchain, so they're the most expensive jobs here. Most PRs touch
  # neither tt-vt nor tt-app — gate those two jobs on paths-filter output
  # instead of running them unconditionally on every push/PR. Workspace-wide
  # files (Cargo.lock/.toml, the toolchain pin, this workflow) always count
  # as "changed" since a dependency or toolchain bump can affect either crate
  # without touching its directory.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      vt_or_app: ${{ steps.filter.outputs.vt_or_app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vt_or_app:
              - 'crates/tt-vt/**'
              - 'crates-tauri/tt-app/**'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Rust version + components are pinned by rust-toolchain.toml at the
      # repo root. rustup honors that file for every cargo/rustc invocation, so
      # we provision it explicitly here (installs the channel + rustfmt/clippy)
      # rather than pinning a duplicate version in the workflow.
      - name: Provision pinned Rust toolchain
        # ubuntu-latest ships a preinstalled default toolchain that can be a
        # different version than our rust-toolchain.toml pin. Left in place
        # alongside the pinned one, it makes Swatinem/rust-cache's cache key
        # (which hashes every installed toolchain) unstable across otherwise
        # identical runs — confirmed via CI audit: the same commit produced
        # two different cache-key hashes depending on which stray toolchain
        # happened to be present, so tt-vt/tt-app never got a stable hit.
        # Explicitly uninstalling anything but the pin keeps the cache key
        # deterministic.
        run: |
          rustup toolchain install
          active=$(rustup show active-toolchain | awk '{print $1}')
          for tc in $(rustup toolchain list | awk '{print $1}'); do
            [ "$tc" = "$active" ] || rustup toolchain uninstall "$tc"
          done

      - uses: Swatinem/rust-cache@v2

      # crates/tt-vt builds `libghostty-vt`, whose build script compiles
      # libghostty from a ghostty source checkout and needs zig 0.15.x on PATH
      # (GHOSTTY_SOURCE_DIR). That toolchain is provisioned only in the separate
      # `rust-vt` job below, so tt-vt is excluded here — along with
      # crates-tauri/tt-app, the only crate that depends on it (and which also
      # needs webkit2gtk/GTK system libs for the Tauri shell, still uncovered by
      # CI). Everything else — every other Tauri-free crate under crates/ plus
      # crates-cli/tt-cli — is covered here.
      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace --exclude tt-vt --exclude tt-app --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace --exclude tt-vt --exclude tt-app

  rust-vt:
    name: Rust tt-vt (zig + ghostty)
    needs: changes
    if: needs.changes.outputs.vt_or_app == 'true'
    runs-on: ubuntu-latest
    # Pinned ghostty commit that libghostty-vt-sys 0.2.0 builds against (see the
    # GHOSTTY_COMMIT constant in that crate's build.rs). Keep this in sync when
    # bumping libghostty-vt.
    env:
      GHOSTTY_COMMIT: fdbf9ff3a31d7531b691cb49c98fc465a1a503a0
    steps:
      - uses: actions/checkout@v4

      # Same repo-root rust-toolchain.toml pin as the `rust` job.
      - name: Provision pinned Rust toolchain
        # ubuntu-latest ships a preinstalled default toolchain that can be a
        # different version than our rust-toolchain.toml pin. Left in place
        # alongside the pinned one, it makes Swatinem/rust-cache's cache key
        # (which hashes every installed toolchain) unstable across otherwise
        # identical runs — confirmed via CI audit: the same commit produced
        # two different cache-key hashes depending on which stray toolchain
        # happened to be present, so tt-vt/tt-app never got a stable hit.
        # Explicitly uninstalling anything but the pin keeps the cache key
        # deterministic.
        run: |
          rustup toolchain install
          active=$(rustup show active-toolchain | awk '{print $1}')
          for tc in $(rustup toolchain list | awk '{print $1}'); do
            [ "$tc" = "$active" ] || rustup toolchain uninstall "$tc"
          done

      # libghostty-vt's build script shells out to `zig build`; the crate tracks
      # ghostty's Zig version (0.15.x). setup-zig also caches the zig compiler
      # and its global package cache (~/.cache/zig), where ghostty's Zig
      # dependencies land.
      - name: Provision Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Cache the ghostty checkout so we only clone on a commit bump. The clone
      # mirrors what build.rs would do itself when GHOSTTY_SOURCE_DIR is unset.
      - name: Cache ghostty source
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: ghostty-src
          key: ghostty-src-${{ env.GHOSTTY_COMMIT }}

      - name: Clone ghostty source
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none --no-checkout \
            https://github.com/ghostty-org/ghostty.git ghostty-src
          git -C ghostty-src checkout "$GHOSTTY_COMMIT"

      - uses: Swatinem/rust-cache@v2
        with:
          # Keep this job's cargo/zig build artifacts separate from the `rust`
          # job's cache.
          key: tt-vt

      - name: clippy (tt-vt)
        env:
          GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
        run: cargo clippy -p tt-vt -- -D warnings

      - name: test (tt-vt)
        env:
          GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
        run: cargo test -p tt-vt

  rust-app:
    name: Rust tt-app (webkit2gtk + zig)
    needs: changes
    if: needs.changes.outputs.vt_or_app == 'true'
    runs-on: ubuntu-latest
    # tt-app is the Tauri shell: it needs webkit2gtk/GTK system libs (below) and,
    # via its tt-vt dependency, zig + a ghostty checkout — so it can't ride the
    # plain `rust` job. This job covers clippy for it; the wdio feature stays off
    # (`--no-default-features`) so the E2E-only plugins aren't compiled in CI.
    #
    # Pinned ghostty commit that libghostty-vt-sys 0.2.0 builds against (see the
    # GHOSTTY_COMMIT constant in that crate's build.rs). Keep this in sync when
    # bumping libghostty-vt.
    env:
      GHOSTTY_COMMIT: fdbf9ff3a31d7531b691cb49c98fc465a1a503a0
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 Linux prerequisites (see tauri.app/start/prerequisites). These
      # provide the webkit2gtk/GTK/appindicator system libs the Tauri shell links
      # against, which is why tt-app is excluded from the plain `rust` job.
      # Caching /var/cache/apt/archives (plain first-party actions/cache, same
      # pattern several popular Tauri repos use) avoided re-downloading these
      # every run (CI audit, 2026-07) — tried a third-party apt-caching action
      # first, but it silently reported success while installing 0 packages
      # after a transient mirror 404, which plain apt-get fails loudly on.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-tauri-deps-${{ runner.os }}

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      # Same repo-root rust-toolchain.toml pin as the `rust` job.
      - name: Provision pinned Rust toolchain
        # ubuntu-latest ships a preinstalled default toolchain that can be a
        # different version than our rust-toolchain.toml pin. Left in place
        # alongside the pinned one, it makes Swatinem/rust-cache's cache key
        # (which hashes every installed toolchain) unstable across otherwise
        # identical runs — confirmed via CI audit: the same commit produced
        # two different cache-key hashes depending on which stray toolchain
        # happened to be present, so tt-vt/tt-app never got a stable hit.
        # Explicitly uninstalling anything but the pin keeps the cache key
        # deterministic.
        run: |
          rustup toolchain install
          active=$(rustup show active-toolchain | awk '{print $1}')
          for tc in $(rustup toolchain list | awk '{print $1}'); do
            [ "$tc" = "$active" ] || rustup toolchain uninstall "$tc"
          done

      # tt-app depends on tt-vt, whose build script shells out to `zig build`
      # against a ghostty checkout — same provisioning as the `rust-vt` job.
      - name: Provision Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Cache the ghostty checkout so we only clone on a commit bump. The clone
      # mirrors what build.rs would do itself when GHOSTTY_SOURCE_DIR is unset.
      - name: Cache ghostty source
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: ghostty-src
          key: ghostty-src-${{ env.GHOSTTY_COMMIT }}

      - name: Clone ghostty source
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none --no-checkout \
            https://github.com/ghostty-org/ghostty.git ghostty-src
          git -C ghostty-src checkout "$GHOSTTY_COMMIT"

      - uses: Swatinem/rust-cache@v2
        with:
          # Keep this job's cargo/zig build artifacts separate from the other
          # rust jobs' caches.
          key: tt-app

      - name: clippy (tt-app)
        env:
          GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
        run: cargo clippy -p tt-app --no-default-features -- -D warnings

      # Run tt-app's unit tests with the same feature set clippy checks
      # (`--no-default-features`). The `wdio` feature stays off deliberately: it
      # pulls in the E2E-only tauri-plugin-wdio{,-webdriver} plugins, and those
      # paths are exercised by the nightly e2e job (which builds `--features
      # wdio`) rather than on every PR.
      - name: test (tt-app)
        env:
          GHOSTTY_SOURCE_DIR: ${{ github.workspace }}/ghostty-src
        run: cargo test -p tt-app --no-default-features
