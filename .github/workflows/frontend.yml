name: Frontend

on:
  push:
    branches: [main]
    paths: &client-paths
      - "apps/client/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths: *client-paths

# Cancel superseded runs on the same ref to keep CI fast.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client (typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # npm workspaces: install from the repo root so apps/client resolves.
      - name: npm ci
        run: npm ci
        working-directory: .

      # Dev-tooling scripts (per-task port derivation) — run from the repo root.
      # `.mjs` sources, typechecked via JSDoc + checkJs (scripts/tsconfig.json).
      - name: typecheck scripts
        run: npm run typecheck:scripts
        working-directory: .

      - name: test scripts
        run: npm run test:scripts
        working-directory: .

      - name: typecheck
        run: npx tsc -b

      # oxlint over apps/client. The repo documents oxlint *warnings* as
      # non-blocking, but `npm run lint` (oxlint .) only exits non-zero on
      # errors, and the tree is currently clean — so a non-zero exit here is a
      # real regression worth blocking on.
      - name: lint
        run: npm run lint

      - name: test
        run: npx vitest run

      # `npm run build` here is apps/client's own `tsc -b && vite build`, which
      # runs without the Tauri shell (the root `npm run build` is `tauri build`
      # and is intentionally not run in CI — it needs the Tauri toolchain and
      # webkit2gtk/GTK system libs).
      - name: build
        run: npm run build
