[package]
name = "tt-app"
version = "0.1.0"
edition = "2024"
publish = false

# Produce a library for mobile support (Tauri mobile pattern)
[lib]
name = "tt_app_lib"
crate-type = ["staticlib", "cdylib", "lib"]

[build-dependencies]
tauri-build = { workspace = true }

[dependencies]
tauri = { workspace = true, features = ["devtools"] }
serde = { workspace = true }
serde_json = { workspace = true }
